<!DOCTYPE html>
<html>
<head>
    <title>AstroGuru AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🔮 AstroGuru AI</h1>
    <p>Ancient Vedic Wisdom Powered by AI</p>

    <input type="text" id="name" placeholder="Enter Your Name">

    <br>

    <input type="text" id="birthTime" placeholder="Birth Time (08:29 AM)">

    <br>

    <input type="text" id="birthPlace" placeholder="Birth Place">

    <br>

    <select id="day">
        <option value="">Date</option>
    </select>

    <br>

    <select id="month">
        <option value="">Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>

    <br>

    <select id="year">
        <option value="">Year</option>
    </select>

    <br>

    <button onclick="generatePrediction()">
        Generate Prediction
    </button>

    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
